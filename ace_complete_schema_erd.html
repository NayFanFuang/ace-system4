
<style>
#erd svg.erDiagram .divider path{stroke-opacity:.5}
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect{stroke:none!important}
#erd{width:100%;overflow-x:auto}
h2.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
</style>
<h2 class="sr-only">ACE Operations System — Complete ERD: 27 tables across 8 groups: HR Master, Auth, HR Employee, Project, Clock, Compliance, Leave, and Reference data</h2>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad:false, theme:'base',
  fontFamily:'"Anthropic Sans",sans-serif',
  themeVariables:{
    darkMode:dark, fontSize:'12px',
    fontFamily:'"Anthropic Sans",sans-serif',
    lineColor: dark?'#9c9a92':'#73726c',
    textColor: dark?'#c2c0b6':'#3d3d3a',
  }
});
const diagram = `erDiagram

  departments {
    int id PK
    string code
    string name
    bool is_active
  }
  teams {
    int id PK
    int dept_id FK
    string code
    string name
  }
  positions {
    int id PK
    int dept_id FK
    int team_id FK
    string code
    string clock_type
    bool gps_required
    bool photo_required
  }
  users {
    int id PK
    string employee_code
    string email
    int position_id FK
    string status
    bool is_active
  }

  user_sessions {
    int id PK
    int user_id FK
    string refresh_token_hash
    timestamptz expires_at
  }
  password_reset_tokens {
    int id PK
    int user_id FK
    string token_hash
    timestamptz expires_at
  }

  employee_profiles {
    int id PK
    int user_id FK
    string national_id
    date date_of_birth
    string bank_account_no
    string sso_no
  }
  emergency_contacts {
    int id PK
    int user_id FK
    string name
    string relationship
    string phone
    bool is_primary
  }
  employee_contracts {
    int id PK
    int user_id FK
    string contract_type
    date start_date
    date end_date
    string vendor_name
    bool is_current
  }
  employee_documents {
    int id PK
    int user_id FK
    string doc_type
    string file_url
    date expires_at
  }
  employee_status_log {
    int id PK
    int user_id FK
    string from_status
    string to_status
    date effective_date
  }

  customers {
    int id PK
    string code
    string name
  }
  projects {
    int id PK
    int customer_id FK
    int team_id FK
    int pm_user_id FK
    string project_code
    string project_type
    string status
  }
  sites {
    int id PK
    int project_id FK
    int customer_id FK
    string site_code
    decimal latitude
    decimal longitude
    int gps_radius_m
  }
  project_assignments {
    int id PK
    int project_id FK
    int user_id FK
    string role_in_project
    date start_date
    date end_date
    bool is_active
  }
  project_roles {
    int id PK
    int project_id FK
    int user_id FK
    string role
  }

  work_schedules {
    int id PK
    string name
    time start_time
    time end_time
    int late_grace_minutes
  }
  employee_work_schedules {
    int id PK
    int user_id FK
    int schedule_id FK
    date effective_from
    date effective_to
  }
  clock_sessions {
    int id PK
    int user_id FK
    int project_id FK
    int site_id FK
    date clock_date
    string clock_type
    string project_code
    timestamptz clock_in_at
    timestamptz clock_out_at
    int total_minutes
    string status
  }
  clock_photos {
    int id PK
    int clock_session_id FK
    string photo_type
    string photo_url
  }

  compliance_daily {
    int id PK
    int user_id FK
    int project_id FK
    date work_date
    bool send_line
    bool location_ok
    bool clock_ok
    decimal score
  }
  headcount_monthly {
    int id PK
    int team_id FK
    int project_id FK
    string month_iso
    int headcount
  }

  public_holidays {
    int id PK
    date holiday_date
    string name
    int year
  }
  leave_requests {
    int id PK
    int user_id FK
    int project_id FK
    string request_id
    string leave_type
    date start_date
    date end_date
    string status
  }

  departments ||--o{ teams : "has"
  departments ||--o{ positions : "has"
  teams ||--o{ positions : "has"
  positions ||--o{ users : "assigned to"

  users ||--|| employee_profiles : "has profile"
  users ||--o{ emergency_contacts : "has"
  users ||--o{ employee_contracts : "has"
  users ||--o{ employee_documents : "has"
  users ||--o{ employee_status_log : "tracks"

  users ||--o{ user_sessions : "has"
  users ||--o{ password_reset_tokens : "has"

  customers ||--o{ projects : "owns"
  teams ||--o{ projects : "executes"
  users ||--o{ projects : "manages as PM"
  projects ||--o{ sites : "has"
  customers ||--o{ sites : "owns"
  projects ||--o{ project_assignments : "has"
  users ||--o{ project_assignments : "assigned to"
  projects ||--o{ project_roles : "has"
  users ||--o{ project_roles : "has role in"

  users ||--o{ employee_work_schedules : "uses"
  work_schedules ||--o{ employee_work_schedules : "assigned via"
  users ||--o{ clock_sessions : "logs"
  projects ||--o{ clock_sessions : "recorded in"
  sites ||--o{ clock_sessions : "location of"
  clock_sessions ||--o{ clock_photos : "has"

  users ||--o{ compliance_daily : "tracked in"
  projects ||--o{ compliance_daily : "scope"
  teams ||--o{ headcount_monthly : "counted in"
  projects ||--o{ headcount_monthly : "counted in"

  users ||--o{ leave_requests : "submits"
  projects ||--o{ leave_requests : "notifies PM"
`;
const {svg} = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg.erDiagram .node').forEach(node=>{
  const fp=node.querySelector('path[d]');
  if(!fp)return;
  const nums=(fp.getAttribute('d').match(/-?[\d.]+/g)||[]).map(Number);
  if(nums.length<8)return;
  const xs=[nums[0],nums[2],nums[4],nums[6]],ys=[nums[1],nums[3],nums[5],nums[7]];
  const x=Math.min(...xs),y=Math.min(...ys),w=Math.max(...xs)-x,h=Math.max(...ys)-y;
  const r=document.createElementNS('http://www.w3.org/2000/svg','rect');
  r.setAttribute('x',x);r.setAttribute('y',y);r.setAttribute('width',w);r.setAttribute('height',h);r.setAttribute('rx','8');
  for(const a of['fill','stroke','stroke-width','class','style'])if(fp.hasAttribute(a))r.setAttribute(a,fp.getAttribute(a));
  fp.replaceWith(r);
});
document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path,#erd svg.erDiagram .row-rect-even path').forEach(p=>p.setAttribute('stroke','none'));
</script>
