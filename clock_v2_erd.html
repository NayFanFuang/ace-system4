
<style>
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
#erd { width: 100%; overflow-x: auto; }
</style>
<h2 class="sr-only">ERD for Clock In/Out 2.0 — 13 tables across 4 groups: HR Master, Auth, Clock, Leave</h2>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const diagram = `erDiagram
  departments {
    int id PK
    string code
    string name
    bool is_active
  }
  teams {
    int id PK
    int dept_id FK
    string code
    string name
    bool is_active
  }
  positions {
    int id PK
    int dept_id FK
    int team_id FK
    string code
    string name
    string clock_type
    bool gps_required
    bool photo_required
  }
  users {
    int id PK
    string employee_code
    string email
    string password_hash
    int position_id FK
    string first_name
    string last_name
    decimal work_latitude
    decimal work_longitude
    int allowed_radius_meters
    bool is_active
  }
  user_sessions {
    int id PK
    int user_id FK
    string refresh_token_hash
    string device_info
    inet ip_address
    timestamptz expires_at
  }
  password_reset_tokens {
    int id PK
    int user_id FK
    string token_hash
    timestamptz expires_at
    timestamptz used_at
  }
  sites {
    int id PK
    string site_code
    string customer
    string site_name
    decimal latitude
    decimal longitude
    int gps_radius_m
  }
  work_schedules {
    int id PK
    string name
    time start_time
    time end_time
    int late_grace_minutes
  }
  employee_work_schedules {
    int id PK
    int user_id FK
    int schedule_id FK
    date effective_from
    date effective_to
  }
  clock_sessions {
    int id PK
    int user_id FK
    date clock_date
    string clock_type
    timestamptz clock_in_at
    decimal clock_in_lat
    decimal clock_in_lng
    string clock_in_address
    timestamptz clock_out_at
    decimal clock_out_lat
    decimal clock_out_lng
    string clock_out_address
    int site_id FK
    int total_minutes
    bool is_late
    int late_minutes
    string status
    int approved_by FK
  }
  clock_photos {
    int id PK
    int clock_session_id FK
    string photo_type
    string photo_url
    decimal lat
    decimal lng
    timestamptz captured_at
  }
  public_holidays {
    int id PK
    date holiday_date
    string name
    int year
  }
  leave_requests {
    int id PK
    string request_id
    int user_id FK
    string leave_type
    string session
    date start_date
    date end_date
    decimal requested_days
    string status
    string current_approver_email
    string approval_token_hash
    timestamptz token_expires_at
  }

  departments ||--o{ teams : "has"
  departments ||--o{ positions : "has"
  teams ||--o{ positions : "has"
  positions ||--o{ users : "assigned to"
  users ||--o{ user_sessions : "has"
  users ||--o{ password_reset_tokens : "has"
  users ||--o{ employee_work_schedules : "uses"
  work_schedules ||--o{ employee_work_schedules : "assigned via"
  users ||--o{ clock_sessions : "logs"
  sites ||--o{ clock_sessions : "referenced by"
  users ||--o{ clock_sessions : "approves"
  clock_sessions ||--o{ clock_photos : "has"
  users ||--o{ leave_requests : "submits"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
