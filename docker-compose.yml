services:
  postgres:
    image: postgres:16
    container_name: ace-system-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ace_system}
      POSTGRES_USER: ${POSTGRES_USER:-ace_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ace_password}
    ports:
      - "5433:5432"
    volumes:
      - ace_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ace_user} -d ${POSTGRES_DB:-ace_system}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ace-system-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://ace_user:ace_password@postgres:5432/ace_system}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-local-dev-secret-key-change-before-production-64chars}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-8}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:5173}
      SMTP_PROVIDER: ${SMTP_PROVIDER:-Company SMTP}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_TLS: ${SMTP_TLS:-true}
      FTP_HOST: ${FTP_HOST:-}
      FTP_PORT: ${FTP_PORT:-21}
      FTP_USER: ${FTP_USER:-}
      FTP_PASSWORD: ${FTP_PASSWORD:-}
      FTP_BASE_DIR: ${FTP_BASE_DIR:-/1_Logfile DT Day}
      FTP_TIMEOUT: ${FTP_TIMEOUT:-60}
    ports:
      - "8000:8000"
    volumes:
      - ./photos:/app/photos
      - ./reports:/app/reports
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ace-system-frontend
    restart: unless-stopped
    environment:
      VITE_API_TARGET: http://backend:8000
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  ace_postgres_data:
