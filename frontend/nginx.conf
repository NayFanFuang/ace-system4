server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # อนุญาตอัปโหลดบิล PDF สแกน (หลาย MB) — ค่า default 1MB ทำให้ nginx คืนหน้า HTML 413
    # ตั้งให้สูงกว่าลิมิตฝั่งแอป (MAX_PDF_MB=25) เพื่อให้ไฟล์ใหญ่เกินได้ JSON error จาก FastAPI แทน HTML
    client_max_body_size 30M;

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # OCR บิลสแกน ~6 วิ/หน้า — บิลหลายหน้าใช้เวลานาน จึงเพิ่ม timeout
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /photos/ {
        proxy_pass http://backend:8000/photos/;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
